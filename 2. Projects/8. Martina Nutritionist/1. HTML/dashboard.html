<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Martina's Nutrition Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAPIBLBENbZMRLKV2Qxfn1fgwt77o4gBYM",
      authDomain: "martina-nutritionist.firebaseapp.com",
      projectId: "martina-nutritionist",
      storageBucket: "martina-nutritionist.firebasestorage.app",
      messagingSenderId: "77091426609",
      appId: "1:77091426609:web:ed36b19e1443ffd7e76010",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Load weight history
    async function loadWeightChart() {
      const q = query(collection(db, "weight"), orderBy("timestamp", "asc"));
      const snapshot = await getDocs(q);

      const labels = [];
      const data = [];

      snapshot.forEach((doc) => {
        const d = doc.data();
        const date = d.timestamp?.toDate();
        if (date) {
          labels.push(date.toLocaleDateString("en-GB", { day: "numeric", month: "short" }));
          data.push(d.kg);
        }
      });

      const ctx = document.getElementById("weightChart").getContext("2d");
      new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: "Weight (kg)",
            data,
            borderColor: "#e07b8a",
            backgroundColor: "rgba(224, 123, 138, 0.1)",
            tension: 0.3,
            fill: true,
            pointRadius: 5,
            pointBackgroundColor: "#e07b8a",
          }],
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
          },
          scales: {
            y: {
              beginAtZero: false,
              ticks: { color: "#555" },
              grid: { color: "#eee" },
            },
            x: {
              ticks: { color: "#555" },
              grid: { display: false },
            },
          },
        },
      });
    }

    // Load recent meals
    async function loadMeals() {
      const q = query(collection(db, "meals"), orderBy("timestamp", "desc"), limit(20));
      const snapshot = await getDocs(q);

      const list = document.getElementById("mealList");
      list.innerHTML = "";

      if (snapshot.empty) {
        list.innerHTML = "<p class='empty'>No meals logged yet.</p>";
        return;
      }

      snapshot.forEach((doc) => {
        const d = doc.data();
        const date = d.timestamp?.toDate();
        const dateStr = date
          ? date.toLocaleDateString("en-GB", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" })
          : "Unknown date";

        const item = document.createElement("div");
        item.className = "meal-item";
        item.innerHTML = `
          <div class="meal-date">${dateStr}</div>
          <div class="meal-type">${d.type === "photo" ? "📷 Photo" : "💬 Text"}</div>
          ${d.userMessage ? `<div class="meal-message">${d.userMessage}</div>` : ""}
          <div class="meal-reply">${d.botReply}</div>
        `;
        list.appendChild(item);
      });
    }

    loadWeightChart();
    loadMeals();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fdf6f7;
      color: #333;
      padding: 24px 16px;
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.6rem;
      color: #c0506a;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    h2 {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    canvas {
      width: 100% !important;
    }

    .meal-item {
      border-bottom: 1px solid #f0e6e8;
      padding: 16px 0;
    }

    .meal-item:last-child {
      border-bottom: none;
    }

    .meal-date {
      font-size: 0.75rem;
      color: #aaa;
      margin-bottom: 4px;
    }

    .meal-type {
      font-size: 0.8rem;
      color: #c0506a;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .meal-message {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 6px;
      font-style: italic;
    }

    .meal-reply {
      font-size: 0.88rem;
      color: #333;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .empty {
      color: #aaa;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>Martina's Dashboard</h1>
  <p class="subtitle">Your personal nutrition journey</p>

  <div class="card">
    <h2>Weight Journey</h2>
    <canvas id="weightChart"></canvas>
  </div>

  <div class="card">
    <h2>Recent Meals</h2>
    <div id="mealList">Loading...</div>
  </div>
</body>
</html>
